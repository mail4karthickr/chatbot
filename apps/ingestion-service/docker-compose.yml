services:
  ingestion-api:
    build: .
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside compose the broker is reachable at service name `rabbitmq`
      # over the shared `chatbot` network. Overrides the .env / config default.
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
    restart: unless-stopped
    networks:
      - chatbot

  ingestion-worker:
    build: .                                # same image as ingestion-api (Option B)
    command: ["python", "worker.py"]         # different entrypoint → runs main()
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
    restart: unless-stopped
    networks:
      - chatbot

networks:
  # Created by apps/rabbitmq/docker-compose.yml — bring that stack up first.
  chatbot:
    external: true
